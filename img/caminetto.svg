    <path d="M200 165 C 172 205, 178 235, 200 250 C 224 235, 232 200, 200 165 Z" fill="url(#fuocoCamino)" opacity="0.95"/>
  </g>
  <path d="M200 190 C 186 212, 190 232, 202 240 C 214 226, 216 208, 200 190 Z" fill="#F6C878"/>

  <!-- ceppi di legna -->
  <rect x="160" y="238" width="80" height="14" rx="6" fill="#4A3018"/>
  <rect x="170" y="226" width="60" height="12" rx="6" fill="#5A3620"/>

  <!-- mensola -->
  <rect x="60" y="95" width="280" height="14" fill="#4A3018"/>
