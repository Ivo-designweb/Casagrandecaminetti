<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Caminetto in muratura acceso">
  <defs>
    <radialGradient id="fuocoCamino" cx="50%" cy="75%" r="65%">
      <stop offset="0%" stop-color="#F6C878"/>
      <stop offset="45%" stop-color="#C1440E"/>
      <stop offset="100%" stop-color="#6B2A0A"/>
    </radialGradient>
    <filter id="sfCamino"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="400" height="300" fill="#EDE3D3"/>

  <!-- struttura in muratura -->
  <rect x="70" y="60" width="260" height="190" fill="#6B4226"/>
